<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>글로그 발췌 생성기</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        /* 폰트 설정 */
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&display=swap');
        @font-face {
            font-family: 'KoPub World Batang';
            src: url('https://cdn.jsdelivr.net/gh/font-kopubworld/batang/KoPubWorldBatangPM.woff2') format('woff2');
        }

        /* 기본 UI 스타일 */
        body {
            margin: 0;
            padding: 20px;
            background-color: #f0f2f5;
            font-family: 'Pretendard', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .controls {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 600px;
            margin-bottom: 30px;
        }

        .control-group {
            margin-bottom: 15px;
        }

        .control-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 14px;
        }

        .helper-text {
            font-size: 12px;
            color: #007bff;
            margin-top: 2px;
            font-weight: normal;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }

        .btn-image { background-color: #28a745; }
        .btn-image:hover { background-color: #218838; }
        .btn-pdf { background-color: #007bff; }
        .btn-pdf:hover { background-color: #0069d9; }

        /* ────────────────────────────────────────────────────────
           가변형 캔버스 레이아웃 설정 (높이는 A4 세로 기준 210mm 고정)
──────────────────────────────────────────────────────── */
        .canvas-container {
            height: 210mm;
            width: max-content;
            background-color: #ffffff;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            display: flex;
            box-sizing: border-box;
            overflow: hidden;
        }

        /* 왼쪽 사진 영역 */
        .left-panel {
            height: 100%;
            width: 148.5mm;
            background-color: #fafafa;
            border-right: 1px solid #eaeaea;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: width 0.2s ease;
            flex-shrink: 0;
            position: relative;
        }

        /* 자유 변형 제어를 위한 드래그 컨테이너 */
        .image-container {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
            cursor: move; /* 마우스 오버 시 이동 아이콘 표시 */
            user-select: none;
        }

        /* 마우스 조작을 직접 반영하기 위한 절대 좌표 스타일 */
        .image-container img {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) translate(0px, 0px) scale(1);
            transform-origin: center center;
            max-width: none;
            max-height: none;
            display: block;
            will-change: transform;
        }

        .no-transition {
            transition: none !important;
        }

        .placeholder-text {
            color: #aaa;
            font-size: 14px;
            pointer-events: none;
        }

        /* 오른쪽 글 영역 (A5 규격 고정) */
        .right-panel {
            width: 148.5mm;
            height: 100%;
            box-sizing: border-box;
            padding: 28mm 24mm 28mm 24mm;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background-color: #ffffff;
            flex-shrink: 0;
        }

        .text-top-group {
            display: flex;
            flex-direction: column;
        }

        .content-title {
            font-family: 'KoPub World Batang', serif;
            font-size: 9.5pt;
            color: #666666;
            text-align: left;
            margin-bottom: 20px;
            min-height: 14px;
        }

        .content-body {
            font-family: 'KoPub World Batang', serif;
            font-size: 10pt;
            line-height: 1.9;
            color: #222222;
            text-align: justify;
            word-break: break-all;
            white-space: normal;
        }

        .content-source {
            font-family: 'KoPub World Batang', serif;
            font-size: 9.5pt;
            color: #666666;
            text-align: right;
            margin-top: 15px;
        }

        @media print {
            body { background: none; padding: 0; }
            .no-print { display: none !important; }
            .canvas-container { box-shadow: none; margin: 0; }
            @page { size: auto; margin: 0; }
        }
    </style>
</head>
<body>

    <div class="controls no-print">
        <div class="control-group">
            <label>1. 좌측 사진 폭 선택</label>
            <select id="widthSelect">
                <option value="148.5mm">A5 (148.5mm)</option>
                <option value="74.25mm">A5 1/2(74.25mm)</option>
            </select>
        </div>
        <div class="control-group">
            <label>
                2. 이미지 업로드
                <div class="helper-text">💡 조작 방법: 사진 영역을 마우스로 드래그하면 이동, 휠을 굴리면 확대/축소가 됩니다.</div>
            </label>
            <input type="file" id="imageInput" accept="image/*">
        </div>
        <div class="control-group">
            <label>3. 폰트 선택</label>
            <select id="fontSelect">
                <option value="'KoPub World Batang', serif">KoPub World 바탕</option>
                <option value="'Nanum Myeongjo', serif">나눔명조</option>
                <option value="'Pretendard', sans-serif">프리텐다드 (고딕)</option>
            </select>
        </div>
        <div class="control-group">
            <label>4. 글 제목 입력 (글 영역 왼쪽 상단 표시)</label>
            <input type="text" id="titleInput" placeholder="예시: 01. 00X00 ">
        </div>
        <div class="control-group">
            <label>5. 본문 내용 입력</label>
            <textarea id="textInput" rows="5" placeholder="우측 영역에 들어갈 글을 입력하세요..."></textarea>
        </div>
        <div class="control-group">
            <label>6. 출처 / 제목 입력 (글 영역 우측 하단 표시)</label>
            <input type="text" id="sourceInput" placeholder="예시: @글커미션 출처 등">
        </div>
        
        <div class="btn-group">
            <button class="btn-image" onclick="saveAsImage()">이미지(.PNG)로 저장</button>
            <button class="btn-pdf" onclick="window.print()">PDF로 인쇄/저장</button>
        </div>
    </div>

    <div class="canvas-container" id="captureArea">
        <div class="left-panel" id="leftPanel">
            <div class="image-container" id="imageContainer">
                <span class="placeholder-text">이미지 영역</span>
            </div>
        </div>
        
        <div class="right-panel">
            <div class="text-top-group">
                <div class="content-title" id="titlePreview"></div>
                <div class="content-body" id="textPreview">
                    여기에 본문 내용이 표시됩니다. 상단 입력창에 글을 작성해 주세요.
                </div>
            </div>
            <div class="content-source" id="sourcePreview"></div>
        </div>
    </div>

    <script>
        // 변형 상태 관리 변수 (위치 좌표 및 확대 비율)
        let scale = 1;
        let translateX = 0;
        let translateY = 0;
        let isDragging = false;
        let startX, startY;

        const container = document.getElementById('imageContainer');

        // 1. 사진 폭 제어
        document.getElementById('widthSelect').addEventListener('change', function(e) {
            document.getElementById('leftPanel').style.width = e.target.value;
        });

        // 2. 이미지 업로드 및 초기화 변형 세팅
        document.getElementById('imageInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    // 값 초기화
                    scale = 1;
                    translateX = 0;
                    translateY = 0;
                    
                    container.innerHTML = `<img src="${event.target.result}" id="targetImg" alt="Uploaded Image" style="transform: translate(-50%, -50%) translate(0px, 0px) scale(1);">`;
                    
                    // 이미지 기본 채우기 비율 연산
                    setTimeout(autoFitImage, 50);
                }
                reader.readAsDataURL(file);
            }
        });

        // 컨테이너에 맞춰서 가득 차도록 최적의 이미지 기본 크기 설정
        function autoFitImage() {
            const img = document.getElementById('targetImg');
            if(!img) return;
            const pWidth = container.offsetWidth;
            const pHeight = container.offsetHeight;
            const iWidth = img.naturalWidth;
            const iHeight = img.naturalHeight;

            const scaleW = pWidth / iWidth;
            const scaleH = pHeight / iHeight;
            // 빈틈 없이 가득 채우는 기본 scale 배율 계산
            scale = Math.max(scaleW, scaleH);
            updateTransform();
        }

        // 변형 인터페이스(Transform) 실시간 업데이트 함수
        function updateTransform() {
            const img = document.getElementById('targetImg');
            if (img) {
                img.style.transform = `translate(-50%, -50%) translate(${translateX}px, ${translateY}px) scale(${scale})`;
            }
        }

        // 🖱️ 자유 변형(Ctrl+T) 드래그 및 마우스 휠 제어 스크립트
        container.addEventListener('mousedown', (e) => {
            if (!document.getElementById('targetImg')) return;
            isDragging = true;
            startX = e.clientX - translateX;
            startY = e.clientY - translateY;
            e.preventDefault();
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            translateX = e.clientX - startX;
            translateY = e.clientY - startY;
            updateTransform();
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
        });

        // 마우스 휠을 통한 실시간 확대/축소 기능
        container.addEventListener('wheel', (e) => {
            if (!document.getElementById('targetImg')) return;
            e.preventDefault();
            const zoomSpeed = 0.05;
            if (e.deltaY < 0) {
                scale += zoomSpeed; // 휠 위로: 확대
            } else {
                scale = Math.max(0.1, scale - zoomSpeed); // 휠 아래로: 축소 (최소 배율 한계 0.1)
            }
            updateTransform();
        }, { passive: false });


        // 3. 글 제목 실시간 반영
        document.getElementById('titleInput').addEventListener('input', function(e) {
            document.getElementById('titlePreview').innerText = e.target.value;
        });

        // 4. 본문 텍스트 실시간 반영
        document.getElementById('textInput').addEventListener('input', function(e) {
            const text = e.target.value.replace(/\n/g, '<br>');
            document.getElementById('textPreview').innerHTML = text || '여기에 본문 내용이 표시됩니다.';
        });

        // 5. 출처 텍스트 실시간 반영
        document.getElementById('sourceInput').addEventListener('input', function(e) {
            document.getElementById('sourcePreview').innerText = e.target.value;
        });

        // 6. 폰트 실시간 변경
        document.getElementById('fontSelect').addEventListener('change', function(e) {
            document.getElementById('titlePreview').style.fontFamily = e.target.value;
            document.getElementById('textPreview').style.fontFamily = e.target.value;
            document.getElementById('sourcePreview').style.fontFamily = e.target.value;
        });

        // 📸 수동 조작 좌표 변환 인터페이스 완벽 연동형 이미지 저장 함수
        function saveAsImage() {
            const element = document.getElementById('captureArea');
            const leftPanel = document.getElementById('leftPanel');
            
            leftPanel.classList.add('no-transition');

            const options = {
                scale: 2, 
                useCORS: true,
                backgroundColor: '#ffffff',
                width: element.offsetWidth,
                height: element.offsetHeight,
                scrollX: 0,
                scrollY: 0
            };

            html2canvas(element, options).then(canvas => {
                const link = document.createElement('a');
                link.download = 'log-quote-' + Date.now() + '.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
                
                leftPanel.classList.remove('no-transition');
            });
        }
    </script>
</body>
</html>
