<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>글로그 발췌 생성기</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        /* 폰트 설정 */
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&display=swap');
        @font-face {
            font-family: 'KoPub World Batang';
            src: url('https://cdn.jsdelivr.net/gh/font-kopubworld/batang/KoPubWorldBatangPM.woff2') format('woff2');
        }

        /* 기본 UI 스타일 */
        body {
            margin: 0;
            padding: 20px;
            background-color: #f0f2f5;
            font-family: 'Pretendard', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .controls {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 600px;
            margin-bottom: 30px;
        }

        .control-group {
            margin-bottom: 15px;
        }

        .control-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 14px;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }

        .btn-image { background-color: #28a745; }
        .btn-image:hover { background-color: #218838; }
        .btn-pdf { background-color: #007bff; }
        .btn-pdf:hover { background-color: #0069d9; }

        /* ────────────────────────────────────────────────────────
           가변형 캔버스 레이아웃 설정 (높이는 A4 세로 기준 210mm 고정)
──────────────────────────────────────────────────────── */
        .canvas-container {
            height: 210mm;
            width: max-content;
            background-color: #ffffff;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            display: flex;
            box-sizing: border-box;
            overflow: hidden;
        }

        /* 왼쪽 사진 영역 */
        .left-panel {
            height: 100%;
            width: 148.5mm;
            background-color: #fafafa;
            border-right: 1px solid #eaeaea;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: width 0.2s ease;
            flex-shrink: 0;
            position: relative; /* 캡처 보정용 기준점 */
        }

        /* 이미지 컨테이너: 크롭(잘라내기)을 위해 고정 비율 설정 */
        .image-container {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
        }

        /* 크롭을 완벽하게 구현하기 위한 CSS 설정 */
        .image-container img {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            object-fit: cover;
            display: block;
        }

        .no-transition {
            transition: none !important;
        }

        .placeholder-text {
            color: #aaa;
            font-size: 14px;
        }

        /* 오른쪽 글 영역 (A5 규격 고정) */
        .right-panel {
            width: 148.5mm;
            height: 100%;
            box-sizing: border-box;
            padding: 28mm 24mm 28mm 24mm;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background-color: #ffffff;
            flex-shrink: 0;
        }

        .text-top-group {
            display: flex;
            flex-direction: column;
        }

        .content-title {
            font-family: 'KoPub World Batang', serif;
            font-size: 9.5pt;
            color: #666666;
            text-align: left;
            margin-bottom: 20px;
            min-height: 14px;
        }

        .content-body {
            font-family: 'KoPub World Batang', serif;
            font-size: 10pt;
            line-height: 1.9;
            color: #222222;
            text-align: justify;
            word-break: break-all;
            white-space: normal;
        }

        .content-source {
            font-family: 'KoPub World Batang', serif;
            font-size: 9.5pt;
            color: #666666;
            text-align: right;
            margin-top: 15px;
        }

        @media print {
            body { background: none; padding: 0; }
            .no-print { display: none !important; }
            .canvas-container { box-shadow: none; margin: 0; }
            @page { size: auto; margin: 0; }
        }
    </style>
</head>
<body>

    <div class="controls no-print">
        <div class="control-group">
            <label>1. 좌측 사진 폭 선택</label>
            <select id="widthSelect">
                <option value="148.5mm">A5 (148.5mm)</option>
                <option value="74.25mm">A5 1/2(74.25mm)</option>
            </select>
        </div>
        <div class="control-group">
            <label>2. 이미지 업로드</label>
            <input type="file" id="imageInput" accept="image/*">
        </div>
        <div class="control-group">
            <label>3. 폰트 선택</label>
            <select id="fontSelect">
                <option value="'KoPub World Batang', serif">KoPub World 바탕</option>
                <option value="'Nanum Myeongjo', serif">나눔명조</option>
                <option value="'Pretendard', sans-serif">프리텐다드 (고딕)</option>
            </select>
        </div>
        <div class="control-group">
            <label>4. 글 제목 입력 (글 영역 왼쪽 상단 표시)</label>
            <input type="text" id="titleInput" placeholder="예시: 01. 00X00 ">
        </div>
        <div class="control-group">
            <label>5. 본문 내용 입력</label>
            <textarea id="textInput" rows="5" placeholder="우측 영역에 들어갈 글을 입력하세요..."></textarea>
        </div>
        <div class="control-group">
            <label>6. 출처 / 제목 입력 (글 영역 우측 하단 표시)</label>
            <input type="text" id="sourceInput" placeholder="예시: @글커미션 출처 등">
        </div>
        
        <div class="btn-group">
            <button class="btn-image" onclick="saveAsImage()">이미지(.PNG)로 저장</button>
            <button class="btn-pdf" onclick="window.print()">PDF로 인쇄/저장</button>
        </div>
    </div>

    <div class="canvas-container" id="captureArea">
        <div class="left-panel" id="leftPanel">
            <div class="image-container" id="imagePreview">
                <span class="placeholder-text">이미지 영역</span>
            </div>
        </div>
        
        <div class="right-panel">
            <div class="text-top-group">
                <div class="content-title" id="titlePreview"></div>
                <div class="content-body" id="textPreview">
                    여기에 본문 내용이 표시됩니다. 상단 입력창에 글을 작성해 주세요.
                </div>
            </div>
            <div class="content-source" id="sourcePreview"></div>
        </div>
    </div>

    <script>
        document.getElementById('widthSelect').addEventListener('change', function(e) {
            document.getElementById('leftPanel').style.width = e.target.value;
        });

        document.getElementById('imageInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    document.getElementById('imagePreview').innerHTML = `<img src="${event.target.result}" alt="Uploaded Image">`;
                }
                reader.readAsDataURL(file);
            }
        });

        document.getElementById('titleInput').addEventListener('input', function(e) {
            document.getElementById('titlePreview').innerText = e.target.value;
        });

        document.getElementById('textInput').addEventListener('input', function(e) {
            const text = e.target.value.replace(/\n/g, '<br>');
            document.getElementById('textPreview').innerHTML = text || '여기에 본문 내용이 표시됩니다.';
        });

        document.getElementById('sourceInput').addEventListener('input', function(e) {
            document.getElementById('sourcePreview').innerText = e.target.value;
        });

        document.getElementById('fontSelect').addEventListener('change', function(e) {
            document.getElementById('titlePreview').style.fontFamily = e.target.value;
            document.getElementById('textPreview').style.fontFamily = e.target.value;
            document.getElementById('sourcePreview').style.fontFamily = e.target.value;
        });

        // 📸 짜부 현상을 완전 정복한 이미지 저장 로직
        function saveAsImage() {
            const element = document.getElementById('captureArea');
            const leftPanel = document.getElementById('leftPanel');
            const img = leftPanel.querySelector('img');
            
            leftPanel.classList.add('no-transition');

            // [핵심!] 만약 이미지가 업로드되어 있다면, html2canvas가 오작동하지 않도록 
            // 현재의 잘라내기(Crop) 상태를 물리적 픽셀 수치로 계산해 고정시킵니다.
            if (img) {
                const containerWidth = leftPanel.offsetWidth;
                const containerHeight = leftPanel.offsetHeight;
                
                // 원본 이미지 비율 계산
                const imgRatio = img.naturalWidth / img.naturalHeight;
                const containerRatio = containerWidth / containerHeight;
                
                if (imgRatio > containerRatio) {
                    // 이미지가 컨테이너보다 가로로 더 긴 경우 -> 세로를 채우고 가로를 자름
                    img.style.width = 'auto';
                    img.style.height = containerHeight + 'px';
                } else {
                    // 이미지가 컨테이너보다 세로로 더 긴 경우 -> 가로를 채우고 세로를 자름
                    img.style.width = containerWidth + 'px';
                    img.style.height = 'auto';
                }
            }

            const options = {
                scale: 2, 
                useCORS: true,
                backgroundColor: '#ffffff',
                width: element.offsetWidth,
                height: element.offsetHeight,
                scrollX: 0,
                scrollY: 0
            };

            html2canvas(element, options).then(canvas => {
                const link = document.createElement('a');
                link.download = 'log-quote-' + Date.now() + '.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
                
                // 저장 후에는 다시 화면 리사이즈에 반응하도록 기존 CSS(기본값)로 롤백
                leftPanel.classList.remove('no-transition');
                if (img) {
                    img.style.width = '100%';
                    img.style.height = '100%';
                }
            });
        }
    </script>
</body>
</html>
